<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;

  .crisis-card-border { border-left-width: 4px; }

<body class="bg-surface text-on-surface min-h-screen pb-10">

<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-md h-16 border-b border-outline-variant shadow-sm">
  <div class="flex items-center gap-4">
    <a href="/" aria-label="Volver" class="hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95 duration-100">
      <span class="material-symbols-outlined text-primary">arrow_back</span>
    </a>
    <h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary">Acopify</h1>
  </div>
  <a href="/login.html" id="nav-login" class="font-label-md text-label-md uppercase tracking-wider text-on-surface-variant hover:text-primary transition-colors">Iniciar sesión</a>
</header>

<main id="centro-content" class="max-w-4xl mx-auto px-gutter py-lg">
  <div class="flex items-center justify-center gap-3 py-20 text-on-surface-variant">
    <span class="material-symbols-outlined animate-spin">progress_activity</span> Cargando...
  </div>
</main>

<!-- Full needs list modal -->
<div class="fixed inset-0 z-[2000] hidden items-end md:items-center justify-center bg-black/40 backdrop-blur-sm p-0 md:p-4" id="modal-needs">
  <div class="bg-surface w-full md:max-w-3xl rounded-t-2xl md:rounded-2xl shadow-xl max-h-[92vh] md:max-h-[85vh] flex flex-col overflow-hidden">
    <div class="flex items-start justify-between gap-4 px-md py-md border-b border-outline-variant bg-surface flex-shrink-0">
      <div>
        <h2 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-on-surface">Insumos necesarios</h2>
        <p class="text-on-surface-variant font-label-md text-label-md mt-xs">Guía general de donación</p>
      </div>
      <button id="btn-close-needs" class="p-2 rounded-full hover:bg-surface-container-low active:scale-95 transition-all flex-shrink-0">
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </button>
    </div>
    <div id="modal-needs-body" class="overflow-y-auto px-md py-md"></div>
  </div>
</div>

<!-- Report modal -->
<div class="fixed inset-0 z-[2000] hidden items-end md:items-center justify-center bg-black/40 backdrop-blur-sm p-0 md:p-4" id="modal-reportar">
  <div class="bg-surface-container-lowest w-full md:max-w-md rounded-t-full md:rounded-full p-lg shadow-xl">
    <h2 class="text-headline-md font-headline-md text-on-background mb-xs">Reportar centro</h2>
    <p class="text-body-md text-on-surface-variant mb-md">Si este centro tiene información incorrecta o sospechosa, envíanos un reporte.</p>
    <label class="text-label-md font-label-md text-on-surface-variant block mb-xs" for="motivo-reporte">Motivo del reporte</label>
    <textarea class="w-full rounded-xl border border-outline-variant bg-surface p-sm text-body-md focus:border-primary focus:ring-primary mb-md" id="motivo-reporte" rows="3" placeholder="Describe el problema..."></textarea>
    <div class="flex justify-end gap-sm">
      <button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low active:scale-95 transition-all" id="btn-cancel-report">Cancelar</button>
      <button class="px-4 py-2 rounded-lg font-label-md text-label-md bg-tertiary-container text-on-tertiary hover:opacity-90 active:scale-95 transition-all" id="btn-send-report">Enviar reporte</button>
    </div>
  </div>
</div>

<footer class="text-center text-status-sm font-status-sm text-outline py-lg">

</footer>
