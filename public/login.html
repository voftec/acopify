<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesion - Acopify</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="nav-logo-icon">📦</span>
        Acopify
      </a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card card">
      <h1>Iniciar sesion</h1>
      <p class="auth-subtitle">Ingresa para gestionar tus centros de acopio</p>

      <div id="auth-error" class="alert alert-error hidden"></div>

      <!-- Google login -->
      <button class="btn btn-google btn-block" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>

      <div class="auth-divider">o</div>

      <!-- Email/password form -->
      <form id="form-login">
        <div class="form-group">
          <label class="form-label" for="email">Correo electronico</label>
          <input class="form-input" type="email" id="email" required placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contrasena</label>
          <input class="form-input" type="password" id="password" required placeholder="Min. 6 caracteres" minlength="6" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="btn-submit">Iniciar sesion</button>
      </form>

      <p class="auth-footer">
        No tienes cuenta? <a href="#" id="toggle-mode">Crear cuenta</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- App Scripts -->
  <script src="/assets/js/firebase-init.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
