<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Acopify - Mis Centros</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="/assets/css/tailwind.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body {
    background-color: #f8f9ff;
    background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
    background-size: 16px 16px;
  }
</style>
</head>
<body class="font-body-md text-on-surface min-h-screen pb-32">

<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 shadow-sm border-b border-outline-variant flex justify-between items-center w-full px-md h-16">
  <div class="flex items-center gap-sm">
    <span class="material-symbols-outlined text-primary" data-icon="emergency">emergency</span>
    <h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary">Acopify</h1>
  </div>
  <div class="flex items-center gap-sm">
    <a href="/dashboard.html" class="text-primary hover:bg-surface-container p-2 rounded-lg transition-colors flex items-center justify-center">
      <span class="material-symbols-outlined" data-icon="map">map</span>
    </a>
    <button id="btn-settings" class="text-primary hover:bg-surface-container p-2 rounded-lg transition-colors flex items-center justify-center">
      <span class="material-symbols-outlined" data-icon="settings">settings</span>
    </button>
    <button id="btn-logout" class="text-error hover:bg-error-container p-2 rounded-lg transition-colors flex items-center justify-center">
      <span class="material-symbols-outlined" data-icon="logout">logout</span>
    </button>
  </div>
</header>

<!-- Auth Required Message -->
<div id="auth-required" class="hidden mx-auto mt-lg px-md max-w-2xl">
  <div class="bg-error-container text-on-error-container p-4 rounded-xl border border-error">
    <div class="flex items-start gap-sm">
      <span class="material-symbols-outlined text-error" data-icon="lock">lock</span>
      <div>
        <p class="font-semibold mb-1">Autenticación requerida</p>
        <p class="text-sm">Debes <a href="/login.html" class="underline font-semibold">iniciar sesión</a> para ver tus centros de acopio.</p>
      </div>
    </div>
  </div>
</div>

<main class="px-md mt-lg max-w-2xl mx-auto flex flex-col gap-lg py-xl hidden" id="main-content">
  <h2 class="text-headline-md font-bold text-on-surface">Mis Centros de Acopio</h2>

  <!-- Center List -->
  <div class="flex flex-col gap-md" id="centros-list">
    <!-- Centers will be rendered here -->
  </div>

  <!-- Register New Center Button -->
  <button id="btn-registrar-nuevo" class="w-full border-2 border-dashed border-outline text-on-surface-variant h-16 rounded-xl flex items-center justify-center gap-sm hover:bg-surface-container transition-colors mt-lg">
    <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
    <span class="font-bold">Registrar Nuevo Centro</span>
  </button>
</main>

<!-- Loading State -->
<div id="loading-state" class="hidden flex flex-col items-center justify-center py-xl">
  <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary-container border-t-transparent mb-4"></div>
  <p class="text-body-md text-on-surface-variant">Cargando tus centros...</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<!-- App Scripts -->
<script src="/assets/js/firebase-init.js"></script>
<script src="/assets/js/firebase-data-manager.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/mis-centros.js"></script>
</body>
</html>
