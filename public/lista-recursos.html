<!DOCTYPE html>
<html class="light" lang="es-VE">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Acopify - Lista de Recursos</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="canonical" href="https://www.acopify.com/lista-recursos" />
<meta name="description" content="Explora la lista de insumos y recursos que necesitan los centros de acopio en Venezuela." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Acopify" />
<meta property="og:title" content="Acopify - Lista de Recursos" />
<meta property="og:description" content="Explora la lista de insumos y recursos que necesitan los centros de acopio en Venezuela." />
<meta property="og:url" content="https://www.acopify.com/lista-recursos" />
<meta property="og:image" content="https://www.acopify.com/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:alt" content="Acopify - mapa de centros de acopio en Venezuela" />
<link rel="stylesheet" href="/assets/css/tailwind.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container min-h-screen">

<!-- TopAppBar -->
<header class="bg-surface w-full top-0 sticky z-50 border-b border-outline-variant flex justify-between items-center px-container-margin-mobile md:px-container-margin-desktop h-16">
  <div class="flex items-center gap-4">
    <a href="/mi-centro.html" class="hover:bg-surface-container transition-colors p-2 rounded-full flex items-center justify-center active:opacity-80">
      <span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
    </a>
    <h1 class="font-headline-md text-headline-md text-primary font-bold">Lista de Recursos</h1>
  </div>
  <div class="flex items-center gap-2">
    <a href="/ajustes.html" class="hover:bg-surface-container transition-colors p-2 rounded-full flex items-center justify-center active:opacity-80">
      <span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
    </a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-container-margin-mobile md:px-container-margin-desktop py-md md:py-lg space-y-md md:space-y-lg mb-24">

  <!-- Auth Required Message -->
  <div id="auth-required" class="hidden">
    <div class="bg-error-container text-on-error-container p-4 rounded-xl border border-error mt-lg">
      <div class="flex items-start gap-sm">
        <span class="material-symbols-outlined text-error" data-icon="lock">lock</span>
        <div>
          <p class="font-semibold mb-1">Autenticación requerida</p>
          <p class="text-sm">Debes <a href="/login.html" class="underline font-semibold">iniciar sesión</a> para gestionar la lista de recursos.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="flex flex-col items-center justify-center py-xl">
    <img src="/favicon.svg" alt="Cargando" class="w-12 h-12 animate-spin mb-4" />
    <p class="text-body-md text-on-surface-variant">Cargando lista de recursos...</p>
  </div>

  <!-- Content -->
  <div id="recursos-content" class="hidden space-y-md md:space-y-lg">
    <!-- Header Info -->
    <section class="space-y-sm">
      <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background" id="centro-nombre">Lista de recursos necesarios</h2>
      <p class="font-body-md text-body-md text-on-surface-variant" id="centro-meta"></p>
    </section>

    <!-- Categorized Resource List (rendered dynamically) -->
    <div id="recursos-list" class="space-y-lg"></div>

    <!-- Add Button -->
    <div class="pt-md">
      <button id="btn-agregar" class="w-full bg-primary text-on-primary font-bold py-md rounded-xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">add</span>
        <span>Agregar insumos necesarios</span>
      </button>
    </div>
  </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<!-- App Scripts -->
<script src="/assets/js/firebase-init.js"></script>
<script src="/assets/js/firebase-data-manager.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/recursos-categorias.js"></script>
<script src="/assets/js/lista-recursos.js"></script>
<script src="/assets/js/bottom-nav.js"></script>
</body>
</html>
