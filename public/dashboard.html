<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Acopify - Centros de Acopio Venezuela</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="description" content="Plataforma para localizar y coordinar centros de acopio para ayuda humanitaria en Venezuela." />

          "primary-container": "#2563eb",
          "inverse-surface": "#233144",
          "inverse-on-surface": "#eaf1ff",
          "secondary": "#9d4300",
          "on-primary-container": "#eeefff",
          "error": "#ba1a1a",
          "secondary-fixed-dim": "#ffb690",
          "inverse-primary": "#b4c5ff",
          "tertiary-fixed": "#ffdad6",
          "surface": "#f8f9ff",
          "on-secondary-fixed-variant": "#783200",
          "error-container": "#ffdad6",
          "surface-tint": "#0053db",
          "on-background": "#0d1c2e",

          "secondary-container": "#fd761a",

          "on-primary-fixed": "#00174b",

<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  html, body { height: 100%; overflow: hidden; }
  #map { width: 100%; height: 100%; z-index: 0; }
  .leaflet-control-attribution { font-size: 10px; }

  /* Bottom sheet */
  #bottom-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 30;
    background: #ffffff;
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
    will-change: transform;
    touch-action: none;
  }
  #bottom-sheet.animate { transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1); }
  #sheet-list { overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* Selected marker pulse */
  .marker-selected { filter: drop-shadow(0 0 0 rgba(0,74,198,0.5)); }
</style>
</head>
<body class="bg-background font-body-md text-on-surface">

<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant shadow-sm flex justify-between items-center w-full px-md h-16 fixed top-0 left-0 z-40">
  <div class="flex items-center gap-sm">
    <span class="material-symbols-outlined text-primary" data-icon="emergency">emergency</span>
    <h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary">Acopify</h1>
  </div>
  <!-- Toggle Mapa/Lista -->
  <div class="flex bg-surface-variant rounded-full p-1 border border-outline-variant">
    <button id="tab-mapa" class="px-4 py-1 rounded-full bg-primary text-on-primary text-label-md font-label-md shadow-sm transition-colors">Mapa</button>
    <button id="tab-lista" class="px-4 py-1 rounded-full text-on-surface-variant text-label-md font-label-md transition-colors">Lista</button>
  </div>
  <a id="avatar-btn" href="/login.html" class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant bg-surface-container flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary" title="Cuenta">
    <span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
  </a>
</header>

<!-- Map (fills viewport) -->
<main class="absolute inset-0 pt-16">
  <div id="map"></div>

  <!-- Floating search bar (left padding leaves room for the map zoom controls) -->
  <div id="search-floating" class="absolute top-20 left-0 right-0 pl-16 pr-md z-20">
    <div class="max-w-2xl mx-auto flex gap-sm">
      <div class="relative flex-1">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
        <input id="search-input" type="text" placeholder="Buscar por nombre o zona..."
          class="w-full pl-10 pr-4 py-3 rounded-full border border-outline-variant bg-surface-container-lowest shadow-md focus:ring-2 focus:ring-primary focus:border-primary text-body-md font-body-md placeholder:text-outline outline-none" />
      </div>
      <button id="locate-btn" title="Ubicarme"
        class="p-3 bg-surface-container-lowest border border-outline-variant rounded-full shadow-md text-on-surface hover:bg-surface-container-low transition-colors flex items-center justify-center">
        <span class="material-symbols-outlined" data-icon="my_location">my_location</span>
      </button>
    </div>
  </div>
</main>

<!-- Bottom Sheet (peek = selected center / hint, expanded = full list) -->
<div id="bottom-sheet">
  <!-- Drag handle + header -->
  <div id="sheet-handle" class="flex-shrink-0 pt-2 pb-1 cursor-grab active:cursor-grabbing select-none">
    <div class="w-10 h-1.5 bg-outline-variant rounded-full mx-auto mb-1"></div>
  </div>

  <!-- PEEK: selected center quick card OR hint -->
  <div id="sheet-peek" class="flex-shrink-0 px-md pb-md">
    <!-- filled by JS -->
  </div>

  <!-- EXPANDED: full list -->
  <div id="sheet-list" class="flex-1 px-md pb-24">
    <h2 class="text-headline-md font-headline-md mb-md text-on-surface pt-1">Centros de Acopio Activos</h2>
    <div id="centros-list" class="flex flex-col gap-sm">
      <div class="text-center py-8 text-on-surface-variant">Cargando centros...</div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<!-- App Scripts -->
<script src="/assets/js/firebase-init.js"></script>
<script src="/assets/js/firebase-data-manager.js"></script>
<script src="/assets/js/app.js"></script>
</body>
</html>
