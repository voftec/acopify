<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contrasena - Acopify</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="material-symbols-outlined nav-logo-icon" data-icon="emergency">emergency</span>
        Acopify
      </a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card card">
      <h1>Recuperar contrasena</h1>
      <p class="auth-subtitle">Te enviaremos un enlace para restablecer tu contrasena</p>

      <div id="auth-error" class="alert alert-error hidden"></div>
      <div id="auth-info" class="alert alert-info hidden"></div>

      <form id="form-recuperar">
        <div class="form-group">
          <label class="form-label" for="email">Correo electronico</label>
          <input class="form-input" type="email" id="email" required placeholder="tu@email.com" autocomplete="email" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="btn-submit">Enviar enlace de recuperacion</button>
      </form>

      <p class="auth-footer">
        Recordaste tu contrasena? <a href="/login.html">Iniciar sesion</a>
      </p>
      <p class="auth-footer" style="margin-top: 8px;">
        No tienes cuenta? <a href="/registro.html">Crear cuenta</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

  <!-- App Scripts -->
  <script src="/assets/js/firebase-init.js"></script>
  <script src="/assets/js/recuperar.js"></script>
</body>
</html>
