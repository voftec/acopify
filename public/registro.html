<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acopify - Crear Cuenta</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="canonical" href="https://www.acopify.com/registro" />
  <meta name="description" content="Crea una cuenta en Acopify para registrar y gestionar tu centro de acopio." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Acopify" />
  <meta property="og:title" content="Acopify - Crear Cuenta" />
  <meta property="og:description" content="Crea una cuenta en Acopify para registrar y gestionar tu centro de acopio." />
  <meta property="og:url" content="https://www.acopify.com/registro" />
  <meta property="og:image" content="https://www.acopify.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="Acopify - mapa de centros de acopio en Venezuela" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <link rel="stylesheet" href="/assets/css/tailwind.css" />
  <style>
    /* The card sits below the warning banner, so don't vertically center it —
       that overflows and cuts off the card. Align it near the top with a small
       gap below the banner. */
    .auth-wrapper {
      align-items: flex-start;
      min-height: 0;
      padding-top: 16px;
      padding-bottom: 40px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-background text-on-surface font-body-md">

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="material-symbols-outlined nav-logo-icon" data-icon="emergency">emergency</span>
        Acopify
      </a>
    </div>
  </nav>

  <div class="bg-error-container border-b-4 border-error px-md py-4">
    <div class="max-w-2xl mx-auto flex items-start gap-3">
      <span class="material-symbols-outlined text-error" style="font-size:30px;">warning</span>
      <p class="text-error font-extrabold" style="font-size:17px;line-height:1.4;">Nota: Solo debes crear una cuenta e iniciar sesión si vas a registrar uno o varios centros de acopio.</p>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card card">
      <h1>Crear cuenta</h1>
      <p class="auth-subtitle">Registrate para gestionar centros de acopio</p>

      <div id="auth-error" class="alert alert-error hidden"></div>
      <div id="auth-info" class="alert alert-info hidden"></div>

      <!-- Google sign-up (temporarily hidden until OAuth redirect URI propagates) -->
      <button class="btn btn-google btn-block hidden" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>

      <div class="auth-divider hidden">o</div>

      <!-- Email/password form -->
      <form id="form-registro">
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre</label>
          <input class="form-input" type="text" id="nombre" required placeholder="Tu nombre" autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electronico</label>
          <input class="form-input" type="email" id="email" required placeholder="tu@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contrasena</label>
          <input class="form-input" type="password" id="password" required placeholder="Min. 6 caracteres" minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">Confirmar contrasena</label>
          <input class="form-input" type="password" id="password2" required placeholder="Repite la contrasena" minlength="6" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="btn-submit">Crear cuenta</button>
      </form>

      <p class="auth-footer">
        Ya tienes cuenta? <a href="/login.html">Iniciar sesion</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

  <!-- App Scripts -->
  <script src="/assets/js/firebase-init.js"></script>
  <script src="/assets/js/registro.js"></script>
<script src="/assets/js/bottom-nav.js"></script>
</body>
</html>
