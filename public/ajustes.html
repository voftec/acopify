<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Acopify - Ajustes</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="canonical" href="https://www.acopify.com/ajustes" />
<meta name="description" content="Administra los ajustes de tu cuenta y tu centro de acopio en Acopify." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Acopify" />
<meta property="og:title" content="Acopify - Ajustes" />
<meta property="og:description" content="Administra los ajustes de tu cuenta y tu centro de acopio en Acopify." />
<meta property="og:url" content="https://www.acopify.com/ajustes" />
<meta property="og:image" content="https://www.acopify.com/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:alt" content="Acopify - mapa de centros de acopio en Venezuela" />
<link rel="stylesheet" href="/assets/css/tailwind.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body {
    background-color: #f8f9ff;
    font-family: 'Inter', sans-serif;
    min-height: max(884px, 100dvh);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c3c6d7; border-radius: 10px; }
</style>
</head>
<body class="text-on-surface">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-40 bg-surface shadow-sm border-b border-outline-variant flex justify-between items-center w-full px-md h-16">
  <div class="flex items-center gap-sm">
    <a href="/mi-centro.html" class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-all active:scale-95 flex items-center justify-center" aria-label="Volver">
      <span class="material-symbols-outlined text-on-surface-variant" data-icon="arrow_back">arrow_back</span>
    </a>
    <span class="material-symbols-outlined text-primary" data-icon="emergency">emergency</span>
    <h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary">Acopify</h1>
  </div>
  <div class="flex items-center">
    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container border border-outline-variant">
      <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
    </div>
  </div>
</header>

<main class="pt-24 pb-32 max-w-2xl mx-auto px-md">
  <!-- Header Section -->
  <section class="mb-lg">
    <h2 class="text-headline-lg font-headline-lg text-on-background mb-xs">Ajustes</h2>
    <p class="text-body-md font-body-md text-on-surface-variant">Gestiona tu perfil y preferencias para el esfuerzo de socorro en Venezuela.</p>
  </section>

  <!-- Loading State -->
  <div id="loading-state" class="flex flex-col items-center justify-center py-xl">
    <img src="/favicon.svg" alt="Cargando" class="w-12 h-12 animate-spin mb-4" />
    <p class="text-body-md text-on-surface-variant">Cargando perfil...</p>
  </div>

  <!-- Auth Required -->
  <div id="auth-required" class="hidden bg-error-container text-on-error-container p-4 rounded-xl border border-error">
    <div class="flex items-start gap-sm">
      <span class="material-symbols-outlined text-error" data-icon="lock">lock</span>
      <div>
        <p class="font-semibold mb-1">Autenticación requerida</p>
        <p class="text-sm">Debes <a href="/login.html" class="underline font-semibold">iniciar sesión</a> para ver tu perfil.</p>
      </div>
    </div>
  </div>

  <!-- Profile Content -->
  <div id="profile-content" class="hidden">
    <!-- Profile Card -->
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden mb-lg">
      <div class="p-lg">
        <div class="flex flex-col items-center gap-md mb-lg border-outline-variant pb-lg">
          <div class="w-24 h-24 rounded-full bg-primary-fixed flex items-center justify-center mb-md border-2 border-primary overflow-hidden" id="avatar-container">
            <span class="material-symbols-outlined text-primary !text-[48px]" data-icon="person">person</span>
          </div>
          <div class="text-center">
            <h3 class="text-headline-md font-headline-md text-on-background" id="profile-name">Usuario</h3>
          </div>
        </div>

        <!-- Success/Error Message -->
        <div id="form-message" class="hidden mb-md p-3 rounded-lg text-sm"></div>

        <!-- Form Fields -->
        <form id="form-perfil" class="space-y-md">
          <div>
            <label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="name">Nombre Completo</label>
            <div class="relative">
              <input class="w-full h-12 px-md pt-1 bg-surface-container-low border border-outline-variant rounded-lg text-body-md font-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="name" type="text" placeholder="Tu nombre completo">
              <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="person">person</span>
            </div>
          </div>
          <div>
            <label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="email">Correo Electrónico</label>
            <div class="relative">
              <input class="w-full h-12 px-md pt-1 bg-surface-container-low border border-outline-variant rounded-lg text-body-md font-body-md outline-none opacity-70 cursor-not-allowed" id="email" type="email" placeholder="tu@email.com" disabled>
              <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="mail">mail</span>
            </div>
            <p class="text-[12px] text-on-surface-variant mt-1 ml-1">El correo no se puede modificar.</p>
          </div>
          <div>
            <label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="phone-local">Número de Teléfono</label>
            <div class="flex h-12 bg-surface-container-low border border-outline-variant rounded-lg focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition-all overflow-hidden">
              <select id="phone-cc" class="h-full pl-3 pr-2 bg-transparent border-r border-outline-variant text-body-md font-body-md outline-none cursor-pointer text-on-surface shrink-0">
                <option value="+58">🇻🇪 +58</option>
                <option value="+54">🇦🇷 +54</option>
                <option value="+57">🇨🇴 +57</option>
                <option value="+34">🇪🇸 +34</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+52">🇲🇽 +52</option>
                <option value="+56">🇨🇱 +56</option>
                <option value="+51">🇵🇪 +51</option>
                <option value="+55">🇧🇷 +55</option>
                <option value="+593">🇪🇨 +593</option>
                <option value="+591">🇧🇴 +591</option>
                <option value="+595">🇵🇾 +595</option>
                <option value="+598">🇺🇾 +598</option>
                <option value="+507">🇵🇦 +507</option>
                <option value="+506">🇨🇷 +506</option>
              </select>
              <input class="flex-1 min-w-0 h-full px-3 bg-transparent text-body-md font-body-md outline-none" id="phone-local" type="tel" placeholder="412 555 0199">
              <span class="flex items-center pr-4 material-symbols-outlined text-outline pointer-events-none" data-icon="call">call</span>
            </div>
          </div>
          <div class="pt-sm">
            <button class="w-full py-3 bg-primary text-on-primary rounded-lg font-label-md text-label-md shadow-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit" id="btn-guardar">
              Guardar Cambios
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Log Out Button -->
    <button id="btn-logout" class="w-full py-4 flex items-center justify-center gap-sm bg-error-container text-on-error-container rounded-lg font-headline-md text-headline-md shadow-sm hover:bg-error hover:text-on-error transition-all active:scale-95 group">
      <span class="material-symbols-outlined group-hover:rotate-12 transition-transform" data-icon="logout">logout</span>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<!-- App Scripts -->
<script src="/assets/js/firebase-init.js"></script>
<script src="/assets/js/firebase-data-manager.js"></script>
<script src="/assets/js/ajustes.js"></script>
<script src="/assets/js/bottom-nav.js"></script>
</body>
</html>
